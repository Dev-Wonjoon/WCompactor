settings:
  scan-cooldown-ticks: 4
  max-crafts-per-scan: 16
  compact-on-pickup: true
  compact-on-inventory-click: true
  compact-on-inventory-drag: true
  compact-on-join: true
  debug: false
  silent: true
  skip-when-output-does-not-fit: true

gui:
  title: "Personal Compactor"
  rows: 3
  filler:
    material: "BLACK_STAINED_GLASS_PANE"
    name: " "
    lore: []
  empty-slot:
    material: "GREEN_STAINED_GLASS_PANE"
    name: "&aEmpty Compactor Slot"
    lore:
      - "&7Click with an output item sample."
  selected-recipe:
    append-lore:
      - ""
      - "&aSelected"
      - "&7Recipe: &f{recipe_id}"
  recipe-slots:
    basic: [11, 13, 15]
    advanced: [10, 11, 12, 14, 15, 16]
    super: [9, 10, 11, 12, 14, 15, 16, 17, 18]

tiers:
  basic:
    slots: 3
    fallback-material: "DROPPER"
    display-name: "&6Personal Compactor 3000"
    lore:
      - "&7Automatically compacts selected items."
      - "&7Right-click to configure."
  advanced:
    slots: 6
    fallback-material: "DISPENSER"
    display-name: "&6Personal Compactor 4000"
    lore:
      - "&7Automatically compacts selected items."
      - "&7Right-click to configure."
  super:
    slots: 9
    fallback-material: "DISPENSER"
    display-name: "&6Personal Compactor 5000"
    lore:
      - "&7Automatically compacts selected items."
      - "&7Right-click to configure."

experimental:
  auto-discover-registry-recipes: true
  auto-discover-eco-recipe-files: true
  eco-recipe-directories:
    - "EcoItems/items"
    - "EcoItems/recipes"
